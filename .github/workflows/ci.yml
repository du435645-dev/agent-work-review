name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: work-review --version
      - run: work-review --home "${{ runner.temp }}/work-review-zh" build --language zh --title "Chinese Work Review"
      - run: python scripts/verify_chinese_output.py "${{ runner.temp }}/work-review-zh/output/presentation.html"
