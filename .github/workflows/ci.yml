name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: work-review --version
      - run: python scripts/verify_installed_draft_workflow.py
      - run: work-review --home "${{ runner.temp }}/work-review-zh" build --start 2026-01-01 --end 2026-06-30 --review-id ci-zh --language zh --title "Chinese Work Review"
      - run: python scripts/verify_chinese_output.py "${{ runner.temp }}/work-review-zh/reviews/ci-zh/presentation.html"
